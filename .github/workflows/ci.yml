name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned — practicing what we preach
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./cmd/pinpoint/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Verify binary
        run: |
          ./pinpoint version
          ./pinpoint help
